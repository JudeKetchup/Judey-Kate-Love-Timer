<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J & K LOVE TIMER ❤️</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        height: 100vh;
        background: linear-gradient(135deg, #ff9ebc, #d7a6c3);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #333;
        overflow: hidden;
    }

    .container {
        text-align: center;
        padding: 50px;
        border-radius: 25px;
        background: linear-gradient(145deg, #ffe6eb, #fff0f5);
        box-shadow: 0 10px 40px rgba(255, 105, 180, 0.4);
        max-width: 650px;
        width: 90%;
        color: #333;
        position: relative;
    }

    h1 {
        font-size: 2.8rem;
        margin-bottom: 10px;
        color: #ff4d6d;
        text-shadow: 0 0 10px #ff9ebc;
    }

    .subtitle {
        opacity: 0.8;
        margin-bottom: 30px;
        color: #c03995;
        font-weight: 500;
    }

    .time {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
    }

    .box {
        background: #ffd1dc; /* soft pink */
        padding: 25px;
        border-radius: 20px;
        transition: 0.3s;
        color: #333; /* black text for labels */
        box-shadow: 0 5px 15px rgba(255, 77, 109, 0.3);
    }

    .box:hover {
        transform: scale(1.1);
        box-shadow: 0 10px 25px rgba(255, 77, 109, 0.5);
    }

    .number {
        font-size: 2.2rem;
        font-weight: bold;
        color: #ff2a6d; /* keep numbers pink */
        text-shadow: 0 0 15px #ff7bac;
    }

    .label {
        font-size: 0.9rem;
        opacity: 1;
        color: #000000; /* black labels */
    }

    .love-message {
        margin-top: 35px;
        font-size: 1.1rem;
        opacity: 0.95;
        line-height: 1.6;
        color: #c03995;
        font-style: italic;
    }

    /* Floating hearts */
    .heart {
        position: absolute;
        color: #ff4d6d;
        font-size: 20px;
        animation: float 6s linear infinite;
        user-select: none;
        pointer-events: none;
    }

    @keyframes float {
        0% {
            transform: translateY(100vh) scale(0.5);
            opacity: 0;
        }
        50% {
            opacity: 1;
        }
        100% {
            transform: translateY(-10vh) scale(1.3);
            opacity: 0;
        }
    }
</style>
</head>

<body>

<div class="container">
    <h1>J & K LOVE JOURNEY</h1>
    <div class="subtitle">Since February 17, 2026</div>

    <div class="time">
        <div class="box">
            <div id="days" class="number">0</div>
            <div class="label">Days</div>
        </div>
        <div class="box">
            <div id="hours" class="number">0</div>
            <div class="label">Hours</div>
        </div>
        <div class="box">
            <div id="minutes" class="number">0</div>
            <div class="label">Minutes</div>
        </div>
        <div class="box">
            <div id="seconds" class="number">0</div>
            <div class="label">Seconds</div>
        </div>
    </div>

    <div class="love-message">
        Every second with you is my favorite moment. <br>
        I’m so lucky to have you in my life. ❤️<br>
        I love you very much my baby katey.
    </div>
</div>

<script>
    const startDate = new Date("Feb 17, 2026 00:00:00").getTime();

    function updateTimer() {
        const now = new Date().getTime();
        const diff = now - startDate;

        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((diff / (1000 * 60)) % 60);
        const seconds = Math.floor((diff / 1000) % 60);

        document.getElementById("days").innerText = days;
        document.getElementById("hours").innerText = hours;
        document.getElementById("minutes").innerText = minutes;
        document.getElementById("seconds").innerText = seconds;
    }

    setInterval(updateTimer, 1000);
    updateTimer();

    // Floating hearts generator
    function createHeart() {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerText = "❤";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = Math.random() * 25 + 15 + "px";
        heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
        document.body.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 6000);
    }

    setInterval(createHeart, 300);
</script>

</body>
</html>
